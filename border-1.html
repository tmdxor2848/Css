<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border-1</title>
    <style>
        div{
            width: 300px;
            height: 150px;
            margin: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #box1 {
            border-style: solid;
        }
        #box2 {
            border-style: dotted;
        }
        #box3 {
            border-style: dashed;
        }
    </style>
</head>
<body>
    <div id="box1">solid</div>
    <div id="box2">dotted</div>
    <div id="box3">dashed</div>
</body>
</html>
