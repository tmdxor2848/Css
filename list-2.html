<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bullet-image</title>
    <style>
        ul {
            list-style-image: url(images/table-list-solid-full.svg);
        }
    </style>
</head>
<body>
    <h1>해리포터 시리즈</h1>
    <ul>
        <li>마법사의 돌</li>
        <li>비밀의 방</li>
        <li>아즈카반의 죄수</li>
    </ul>
    <ol style="list-style: upper-alpha;">
        <li>불의 잔</li>
        <li>불사조 기사단</li>
        <li>혼혈 왕자</li>
    </ol>
</body>
</html>
