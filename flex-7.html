<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>flex-7</title>
    <style>
        .container {
            border: 1px solid black;
            background-color: gainsboro;
            display: flex;
            width: 300px;
            height: 150px;
            margin: 10px;
            display: flex;
            flex-flow: row wrap;
        }

        .box {
            background-color: black;
            color: white;
            width: 100px;

            text-align: center;
            border: 1px dotted;
        }

        #opt1 {
            align-content: flex-start;
        }

        #opt2 {
            align-content: flex-end;
        }

        #opt3 {
            align-content: center;
        }

        #opt4 {
            align-content: space-between;
        }

        #opt5 {
            align-content: space-around;
        }

        #opt6 {
            align-content: stretch;
        }
    </style>
</head>

<body>
    <div class="container" id="opt1">
        <div class="box">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box">
            <p>3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>
    </div>
