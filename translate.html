<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>translate</title>
    <style>
        .box {
            width: 250px;
            height: 250px;
            border: 1px solid black;
            margin: 20px;
        }

        [class*=move] {

            width: 100%;
            height: 100%;
            background-color: yellow;
            transition: 0.3s;
        }

        .movex:hover {
            transform: translateX(50px);
        }

        .movey:hover {
            transform: translateY(50px);
        }

        .movexy:hover {
            transform: translate(50px, 50px);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="movex"></div>
    </div>

    <div class="box">
        <div class="movey"></div>
    </div>

    <div class="box">
        <div class="movexy"></div>
    </div>
</body>

</html>
