<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nth</title>
    <style>
        table {
            border-collapse: collapse;
            width: 200px;
        }

        th,
        td {
            border: 1px solid lightgray;
            padding: 8px;
        }

        table tr:nth-of-type(2n+1) {
            background-color: lightgrey;
            color: black;
        }
    </style>
</head>

<body>
    <h1>웹 개발</h1>
    <table>
        <tr>
            <td>HTML</td>
        </tr>
        <tr>
            <td>CSS</td>
        </tr>
        <tr>
            <td>자바스크립트</td>
        </tr>
        <tr>
            <td>React</td>
        </tr>
        <tr>
            <td>node.js</td>
        </tr>
    </table>
</body>

</html>
