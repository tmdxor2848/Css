<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid-6</title>
</head>
<style>
    .wrapper {
        width: 700px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        /* fr (fraction) - 그리드 레이아웃에 상대적인 크기를 지정할 수 있도록 */
        grid-template-rows: repeat(3, 100px);
        /* 칼럼 간격 30px, 줄 간격 20px*/
        grid-template-areas:
            "box1 box1 box1"
            /* 한줄에 들어갈 영역은 큰따옴표로 묶음 */
            "box2 box3 box3"
            "box2 . box4";
        /* 빈 영역은 마침표를 사용 */
    }

    .box1 {
        background-color: #3689ff;
        grid-area: box1;
    }

    .box2 {
        background-color: #00cf12;
        grid-area: box2;
    }

    .box3 {
        background-color: #ff9019;
        grid-area: box3;
    }

    .box4 {
        background-color: #ffd000;
        grid-area: box4;
    }
</style>

<body>
    <div class="wrapper">
        <div class="box box1">box1</div>
        <div class="box box2">box2</div>
        <div class="box box3">box3</div>
        <div class="box box4">box4</div>
    </div>
</body>

</html>
