<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex-5</title>
    <style>
        .container {
            border: 1px solid black;
            background-color: gainsboro;
            display: flex;
            width: 800px;
            height: 150px;
            margin: 10px;
        }

        .box {
            background-color: black;
            color: white;
            width: 100px;

            margin: 20px;
            text-align: center;
        }

        #opt1 {
            align-items: flex-start;
        }

        #opt2 {
            align-items: flex-end;
        }

        #opt3 {
            align-items: center;
        }

        #opt4 {
            align-items: baseline;
        }

        #opt5 {
            align-items: stretch;
        }
    </style>
</head>

<body>
    <div class="container" id="opt1">
        <div class="box">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box">
            <p>3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>

    </div>
    <div class="container" id="opt2">
        <div class="box">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box">
            <p>3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>

    </div>
    <div class="container" id="opt3">
        <div class="box">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box">
            <p>3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>

    </div>
    <div class="container" id="opt4">
        <div class="box">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box">
            <p style="font-size: 20px;">3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>
        <p>baseline 문자 기준선에 맞추어 배치 한다는데 무슨 말인지 잘 모르겠음</p>
    </div>
    <div class="container" id="opt5">
        <div class="box">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box">
            <p>3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>
    </div>

</body>

</html>
