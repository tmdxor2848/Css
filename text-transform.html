<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-transform</title>
    <style>
        table{
            border-collapse: collapse;
            width: 80%;
            height: 400px;
        }
        th{
            border: 1px solid;
            background-color: rgb(184, 160, 207);
            line-height: 2;
        }

        .aa {
            width: 80px;
        }

        td {
            border: 1px solid;
            line-height: 2;
        }
        .a {
            text-align: center;
        }

       .trans1 {
        text-transform: capitalize;
       }
       .trans2 {
        text-transform: uppercase;
       }
       .trans3 {
        text-transform: lowercase;
       }

       
    </style>
</head>
<body>
    <h1>text-shadow</h1>
    <table>
        <thead>
            <tr>
                <th class="aa">종류</th>
                <th>설명</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="a">capitalize</td>
                <td>
                    첫 번쨰 글자를 대문자로 변환
                </td>
            </tr>
            <tr>
                <td class="a">uppercase</td>
                <td>
                    모든 글자를 대문자로 변환
                </td>
            </tr>
            <tr>
                <td class="a">lowercase</td>
                <td>
                    모든 글자를 소문자로 변환
                </td>
            </tr>
            <tr>
                <td class="a">full-width</td>
                <td>
                    가능한 한 모든 문자를 전각 문자로 변환.
                </td>
            </tr>
        </tbody>
    </table>
    <h1 class="trans1">html</h1>
    <h1 class="trans2">css</h1>
    <h1 class="trans3">JaVaScRiPt</h1>
</body>
</html>
