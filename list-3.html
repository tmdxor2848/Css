<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>목록 들여쓰기</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
        }
        th {
            border: 1px solid;
            background-color: rgb(214, 193, 233);
        }
        td {
            border: 1px solid;
        }

        .inside {
            list-style-position: inside;
        }
    </style>
</head>
<body>
    <table>
        <thead>
            <tr>
                <th>종류</th>
                <th>설명</th>
                
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>inside</td>
                <td>불릿이나 번호를 기본 위치보다 안으로 들여씀</td>
            </tr>
            <tr>
                <td>outside</td>
                <td>기본값</td>
            </tr>
            
        </tbody>
    </table>
    <h1>해리포터 시리즈</h1>
    <ul>
        <li>마법사의 돌</li>
        <li>비밀의 방</li>
        <li>아즈카반의 죄수</li>
    </ul>
    <ul class="inside">
        <li>불의 잔</li>
        <li>불사조 기사단</li>
        <li>혼혈 왕자</li>
    </ul>
</body>
</html>
