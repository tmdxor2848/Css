<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>flex-6</title>
    <style>
        .container {
            border: 1px solid black;
            background-color: gainsboro;
            display: flex;
            width: 800px;
            height: 150px;
            margin: 10px;
            display: flex;
            align-items: center;
        }

        .box {
            background-color: black;
            color: white;
            width: 100px;
            min-height: 50px;
            text-align: center;
            margin: 10px;
        }

        #box1 {
            align-self: flex-start;
        }

        #box3 {
            align-self: stretch;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box" id="box1">
            <p>1</p>
        </div>
        <div class="box">
            <p>2</p>
        </div>
        <div class="box" id="box3">
            <p>3</p>
        </div>
        <div class="box">
            <p>4</p>
        </div>
    </div>
</body>

</html>
