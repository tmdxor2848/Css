<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list-navi</title>
    <style>
        nav {
            width: 300px;
            margin: 50px 30px;
        }
        ul {
            list-style: none;
        }
        li {
            border: 1px solid black;
            padding: 20px 40px;
            margin: 5px;
        }
    </style>
</head>
<body>
    <ul>
        <li>회사 소개</li>
        <li>도서</li>
        <li>자료실</li>
        <li>동영상 강의</li>
    </ul>
</body>
</html>
