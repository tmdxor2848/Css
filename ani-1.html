<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ani-1</title>
    <style>
        [class*=box] {
            border: 1px solid transparent;
            /* 투명색 테두리 */
            width: 100px;
            height: 100px;
            margin: 100px;
        }

        .box1 {
            background-color: greenyellow;
            animation-name: shape;
            animation-duration: 3s;
        }

        .box2 {
            background-color: plum;
            animation-name: rotate;
            animation-duration: 3s;
        }

        @keyframes shape {
            from {
                border: 1px solid transparent;
                /* 1px 짜리 투명 테두리에서*/
            }

            to {
                border: 1px solid black;
                /* 검은 테두리로 변경 */
                border-radius: 50%;
                /* 테두리를 둥글게 변경 */
            }
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(45deg);
            }
        }
    </style>
</head>

<body>
    <div class="box1">
    </div>
    <div class="box2">
    </div>
</body>

</html>
