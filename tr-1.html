<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transition-1</title>
    <style>
        .box {
            border: 1px solid black;
            width: 250px;
            height: 250px;
            background-color: skyblue;
            transition-property: width, height;
            transition-duration: 2s, 1s;
        }

        .box:hover {
            width: 450px;
            height: 300px;
        }
    </style>
</head>

<body>
    <div class="box">

    </div>
</body>

</html>
