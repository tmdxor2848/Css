<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid-2</title>
</head>
<style>
    .wrapper {
        display: grid;
        grid-template-columns: repeat(3, 200px);
        /* fr (fraction) - 그리드 레이아웃에 상대적인 크기를 지정할 수 있도록 */
        grid-gap: 20px 30px;
        /* 칼럼 간격 30px, 줄 간격 20px*/
    }

    .items {
        word-break: break-all;
        padding: 10px;
    }

    /* 홀수 */
    .items:nth-child(odd) {
        background-color: lightgray;
    }

    /* 짝수 */
    .items:nth-child(even) {
        background-color: gray;
    }
</style>

<body>
    <div class="wrapper">
        <div class="items">asdsasdasdsadasdsadasdsadasdsadasdsadasdsadsadasdsadasdsadasdsadasdsadasdsadad</div>
        <div class="items">asdaasdsadasdsadasdsadaasdsadasdsadasdsadsdsadasdsadsd</div>
        <div class="items">asdsaasdsadasdsadasdsadasdsadasdsadasdsadd</div>
        <div class="items">asdaasdsadasdsadasdsadasdsadasdsadasdsadasdsadasdsadsd</div>
        <div class="items">asdaasdsadasdsadasdsadasdsadasdsadasdsadasdsadasdsadsd</div>
        <div class="items">asdasd</div>
    </div>
</body>

</html>
