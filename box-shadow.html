<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box-shadow</title>
    <style>
        div {
            border: 1px solid blue;
            border-radius: 20px;
            width: 40%;
            height: 100px;
            margin: 20px;
        }
        .box1 {
            box-shadow: 2px -2px 5px 0px;
        }
        /* box-shadow: 수평거리 수직거리 흐림정도 번짐정도 색상 inset */
        .box2 {
            box-shadow: 5px 5px 15px 10px blue;
        }
    </style>
</head>
<body>
    
    <div class="box1"></div>
    <div class="box2"></div>
   
</body>
</html>
