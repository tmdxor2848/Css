<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ps-2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            border: 1px solid black;
            border-radius: 5px;
            width: 500px;
            padding: 20px;
        }

        fieldset {
            margin-bottom: 20px;
            padding: 15px;
            width: 100%;
        }

        form {
            display: flex;
            flex-direction: column;
            /* 세로 쌓기 */
            align-items: center;
            /* 가로 가운데 정렬 */
        }

        .info {
            display: grid;
            grid-template-columns: 80px 200px;
            justify-content: center;
            align-items: center;
            column-gap: 10px;
        }

        .info label {
            width: auto;
        }

        .info input {
            margin: 10px 0;
        }

        li {
            list-style: none;
            margin: 10px 0;
        }

        input:checked+label {
            color: red;
            font-weight: bold;
        }

        button {
            height: 30px;
            width: 60px;
            border-radius: 30px;
        }

        .btn-wrap {
            display: flex;
            justify-content: center;
        }

        /* 택스트 필드 선택 */
        input[type=text],
        input[type=tel] {
            border: 1px solid #ccc;
            border-radius: 3px;
            padding: 5px;
            width: 200px;
            margin: 10px;
        }

        /* not 선택자로 라디오 필드를 제외한 텍스트 필드 선택 */
        /* input:not([type=radio]) {
             border: 1px solid #ccc;
            border-radius: 3px;
            padding: 5px;
            width: 200px;
            margin: 10px;
        } */

        .room {
            display: flex;
            justify-content: center;
            align-content: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <form action="">
            <fieldset class="info">
                <legend>개인 정보</legend>
                <label for="name">이름</label>
                <input type="text" name="name">
                <label for="phone">연락처</label>
                <input type="tel" name="phone">

            </fieldset>
            <fieldset class="room">
                <legend>객실 형태</legend>
                <ul>
                    <li>
                        <input type="radio" name="room" id="basic">
                        <label for="basic">기본형(최대 2인)</label>
                    </li>
                    <li>
                        <input type="radio" name="room" id="family">
                        <label for="family">가족형(최대 8인)</label>
                    </li>
                </ul>
            </fieldset>
            <div class="btn-wrap">
                <button type="submit">제출</button>
            </div>
        </form>
    </div>


</body>

</html>
