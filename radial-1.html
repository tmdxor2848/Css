<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원형 그라데이션</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        div {
            height: 500px;
            width: 1000px;
        }
        .grad1 {
            background: red;
            background: radial-gradient(white, yellow, red);
            /* 타원형 */
        }
        .grad2 {
            background: red;
            background: radial-gradient(circle, white, yellow, red);
            /* 원형 */
        }
    </style>
</head>
<body>
    <div class="grad1"></div>
    <div class="grad2"></div>
</body>
</html>
