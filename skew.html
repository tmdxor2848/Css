<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skew</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;

        }

        .box {
            width: 250px;
            height: 250px;
            border: 1px solid black;
            margin: 50px;
            perspective: 200px;
        }

        [class*=skew] {

            width: 100%;
            height: 100%;
            background-color: yellow;
            transition: 0.3s;
            /* 변하는데 걸리는 시간 */

        }

        .skewx:hover {
            transform: skewx(25deg);
        }

        .skewy:hover {
            transform: skewy(25deg);
        }

        .skew:hover {
            transform: skew(-25deg, -15deg);
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="skewx"></div>
    </div>

    <div class="box">
        <div class="skewy"></div>
    </div>
    <div class="box">
        <div class="skew"></div>
    </div>


</body>

</html>
