<!DOCTYPE html>
<html lang="koen">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border-3</title>
    <style>
        div {
            width: 300px;
            height: 150px;
            border: dashed;
            margin: 20px;
        }
        #box1 {
            border-color: red;
        }
        #box2 {
            border-top-color: blue;
            border-left-color: red;
        }
    </style> 
</head>
<body>
    <div id="box1"></div>
    <div id="box2"></div>
</body>
</html>
