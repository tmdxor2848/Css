<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>border-2</title>
    <style>
        div {
            height: 100px;
            width: 200px;
            border: solid;
            margin: 20px;
        }
        .box1{
            border-width: 2px;
        }
        .box2{
            border-width: thick thin;
        }
        .box3{
            border-width: thick thin thin;
        }
        .box4{
            border-width: 10px 5px 5px 10px;
        }
    </style>
</head>
<body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
    <div class="box4"></div>
</body>
</html>
