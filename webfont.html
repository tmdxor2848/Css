<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webfont</title>
    <style>
        @font-face {
            font-family: 'BitcountGridDouble-VariableFont_CRSV,ELSH,ELXP,slnt,wght.ttf';
            src: url('fonts/BitcountGridDouble-VariableFont_CRSV,ELSH,ELXP,slnt,wght.ttf') format('truetype')
        }
        .wfont {
            font-family: 'BitcountGridDouble-VariableFont_CRSV,ELSH,ELXP,slnt,wght.ttf', sans-serif;
            font-weight: 300; /* 굵기 테스트 */
        }
        p {
            font-size: 100px;
        }
    </style>
</head>
<body>
    <p>Using Default Fonts</p>
    <p class="wfont">Using Default Fonts</p>
</body>
</html>
