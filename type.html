<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>type 선택자</title>
    <style>
        p {
            font-style: italic; /* 이탤릭체 */
        }
        /* 모든 p요소에 스타일을 적용함 */
    </style>
</head>
<body>
    <div>
        <h1>레드향</h1>
        <p>껍질에 붉은 빛이 돌아 레드향이라 불린다.</p>
        <p>레드향은 한라봉과 귤을 교배한 것으로</p>
        <p>비타민 C와 비타민 P가 풍부하다</p>
    </div>
</body>
</html>
