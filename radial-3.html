<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원형 그라데이션3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
        }
        div {
            height: 100%;
            width: 1000px;
            border-radius: 100%;
        }
        .grad1 {
            background: blue;
            background: radial-gradient(circle at 20% 20%, white, blue);
            /* 타원형 */
        }
      
    </style>
</head>
<body>
    <div class="grad1"></div>
</body>
</html>
