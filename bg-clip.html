<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배경색의 적용 범위 조절</title>
    <style>
        .desc {
            background-color: yellow;
            border: 5px dotted black;
            padding: 20px;
            margin: 20px;
        }
        #clip-border{background-clip: border-box;}
        #clip-padding{background-clip: padding-box;}
        #clip-content{background-clip: content-box;}

    </style>
</head>
<body>
    <div class="container">
        <div class="desc" id="clip-border">
            <h1>레드향</h1>
            <p>껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다.</p>
            <p>레드향은 한라봉과 귤을 교배한 것으로 <br>
            일반 귤 보다 2~3배 크고, 과육이 붉고 통통하다.</p>
        </div>
        <div class="desc" id="clip-padding">
            <h1>레드향</h1>
            <p>껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다.</p>
            <p>레드향은 한라봉과 귤을 교배한 것으로 <br>
            일반 귤 보다 2~3배 크고, 과육이 붉고 통통하다.</p>
        </div>
        <div class="desc" id="clip-content">
            <h1>레드향</h1>
            <p>껍질에 붉은 빛이 돌아 <b>레드향</b>이라 불린다.</p>
            <p>레드향은 한라봉과 귤을 교배한 것으로 <br>
            일반 귤 보다 2~3배 크고, 과육이 붉고 통통하다.</p>
        </div>
    </div>
</body>
</html>
