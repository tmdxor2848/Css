<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text-align</title>
    <style>
        p {
            font-style: italic;
        }
        .accent {
            border: 1px solid #000;
            padding: 5px;
        }

        .bg {
            background-color: #ddd;
        }
        #container {
            width: 500px;
            margin: 10px auto;
            padding: 10px;
            border: 1px solid #000;
        }
        /* 개별 정렬 */
        /* h1 {
            text-align: center;  중앙 정렬 
        }
        p {
            text-align: center;  중앙 정렬 
        } */
        
        /* 그룹 정렬 */
        h1, .center {
            text-align: center;
        }
        .justify {
            text-align: justify;    /* 양쪽 정렬*/
        }
    </style>
</head>
<body>
    <div id="container">
        <h1 class="accent bg">레드향</h1>
        <p>껍질에 붉은 빛이 돌아 <span class="accent">레드향</span>이라 불린다.</p>
        <p class="center">레드향은 한라봉과 귤을 교배한 것으로</p>
        <p class="justify">비타민 C와 비타민 P가 풍부하다</p>
    </div>
</body>
</html>
