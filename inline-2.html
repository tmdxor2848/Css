<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inline-2</title>
    <style>
        h1 {
            border: 1px solid blue;
        }
        div {
            border: 1px solid blue;
        }
        p {
            border: 1px solid blue;
        }
        .accent {
            color: red;
        }
        span {
            border: 1px solid blue;
        }
    </style>
</head>
<body>
    <h1>시간이란...</h1>
    <div>내일 죽을 것 처럼<span class="accent">오늘</span>을 살고</div>
    <p>영원히 살 것처럼 <br>내일을 꿈꾸어라.</p>
    <!-- h1, div, p 태그는 블록 레벨 요소이므로 각각너비가 100%이며 한 줄씩 차지함 -->
    <!-- span 태그는 인라인 레벨 요소이므로 텍스트만큼만 공간을 차지하고 바로 오른쪽에 다른 내용이 연결되어 표시 -->
</body>
</html>
