<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/3column.css">
    <title>3column</title>
</head>
<body>
    <div id="container">
        <header id="header">
            <h1>사이트 제목</h1>
        </header>
        <aside id="left-sidebar">
            <h2>왼쪽 사이드바</h2>
        </aside>
        <section id="contents">
            <h2>본문</h2>
        </section>
        <aside id="right-sidebar">
            <h2>오른쪽 사이드바</h2>
        </aside>
        <footer id="footer">
            <h2>풋터</h2>
        </footer>
    </div>
</body>
</html>
